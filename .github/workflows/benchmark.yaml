# yaml-language-server: $schema=https://json.schemastore.org/github-workflow

name: benchmark

on:
  issue_comment:
    types: [created, edited]

permissions: {}

env:
  CARGO_TERM_COLOR: always

jobs:
  benchmark:
    runs-on: ubuntu-latest
    if: >-
      github.event.issue.pull_request &&
      contains(github.event.comment.body, '/bench') &&
      contains(fromJSON('["OWNER", "MEMBER", "COLLABORATOR"]'), github.event.comment.author_association)
    permissions:
      contents: read
      pull-requests: read

    steps:
      # the workflow is triggered from main branch
      # cf. https://github.com/actions/checkout/issues/331
      # need this first step to init the git repo
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install valgrind
        run: sudo apt-get update && sudo apt-get install valgrind

      - name: Checkout Pull Request
        run: gh pr checkout "$PR_NUMBER"
        env:
          GH_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ github.event.issue.number }}

      # install dependencies
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      # restore cargo cache from previous runs
      - name: Rust Cache
        uses: Swatinem/rust-cache@v2
        with:
          # The cache should not be shared between different workflows and jobs.
          shared-key: ${{ github.workflow }}-${{ github.job }}

      ## Benchmarks
      - name: Checkout default branch
        run: git checkout "$DEFAULT_BRANCH"
        env:
          DEFAULT_BRANCH: ${{ github.event.repository.default_branch }}
      - name: Copy over benchmarks from PR branch
        run: git checkout - -- benches/my_benchmark.rs
      - name: Revert when benches do not compile on main
        run: cargo check --benches --no-default-features || git checkout "$DEFAULT_BRANCH" -- benches/my_benchmark.rs
        env:
          DEFAULT_BRANCH: ${{ github.event.repository.default_branch }}
      - name: Run benchmarks for main branch
        run: cargo bench --no-default-features --features iai
      - name: Checkout PR branch
        run: git checkout -
      - name: Run bench against baseline
        run: cargo bench --no-default-features --features iai | sed '0,/^test result:/d' | tee bench.txt

      # for testing
      # - name: create mock results
      #   run: echo "my bench results" > bench.txt

      ## Save results
      ## see https://securitylab.github.com/research/github-actions-preventing-pwn-requests/
      - name: Save PR number and bench results
        run: |
          mkdir -p ./pr
          echo ${{ github.event.issue.number }} > ./pr/pr_number.txt
          mv bench.txt ./pr/bench.txt
      - uses: actions/upload-artifact@v7
        with:
          name: pr
          path: pr/
          retention-days: 1

  post-result:
    runs-on: ubuntu-latest
    needs: benchmark
    permissions:
      actions: read
      issues: write

    steps:
      - name: Download benchmark result
        uses: actions/download-artifact@v8
        with:
          name: pr
          path: pr

      - name: Write result in PR
        uses: actions/github-script@v9
        with:
          script: |
            const fs = require('fs');
            const issueNumber = Number(fs.readFileSync('pr/pr_number.txt', 'utf8'));
            const bench = fs.readFileSync('pr/bench.txt', 'utf8').replaceAll('```', '`\u200b``');

            const body = '```text\nBenchmark result:\n\n' + bench + '\n```\n';

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: issueNumber,
              body,
            });
